    <style>
        :root { --bg: #0f0f0f; --card: #1e1e1e; --text: #e0e0e0; --green: #25D366; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 10px; 
        }
        h1 { text-align:center; margin:15px 0; color:var(--green); }
        .dashboard { display:flex; justify-content:space-around; background:var(--card); padding:15px; border-radius:12px; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
        .stat { text-align:center; cursor:pointer; padding:8px; border-radius:8px; }
        .stat:hover { background:#333; }
        .stat-value { font-size:1.8em; font-weight:bold; }
        .filters { display:flex; gap:8px; margin-bottom:15px; flex-wrap:wrap; justify-content:center; }
        .filter-btn { padding:10px 18px; background:#2a2a2a; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
        .filter-btn.active { background:var(--green); color:black; }
        .controls { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px; justify-content:center; }
        input { padding:12px 15px; border-radius:8px; background:#2a2a2a; color:white; min-width:220px; }
        button { padding:12px 15px; border-radius:8px; background:var(--green); color:white; cursor:pointer; font-weight:bold; }
        .cliente { background:var(--card); padding:15px; border-radius:12px; margin-bottom:12px; display:grid; grid-template-columns:1fr 1fr auto; gap:12px; align-items:center; }
        @media (max-width:768px) { .cliente { grid-template-columns:1fr; } }
        .telefone-input { padding:10px; background:#2a2a2a; color:white; border:1px solid #444; border-radius:6px; width:100%; }
        .btn-whatsapp { background:#25D366; padding:12px 20px; font-size:18px; }
        .verde { border-left:5px solid #4ade80; }
        .amarelo { border-left:5px solid #fbbf24; }
        .vermelho { border-left:5px solid #ef4444; }
        .nome-vencido { color: #ef4444 !important; font-weight: bold; }
    </style>
</head>

Não deixe de curtir o MELHOR CONTEÚDO DISPONÍVEL! 😄

- PIX e-mail = canaisdtv@gmail.com
- Telefone = 11958357774
- Se preferir link Mercado Pago = https://mpago.la/1PNvdBx ou https://link.mercadopago.com.br/ddtv`;

        function parseData(txt) {
            const p = txt.split("/");
            const d = +p[0], m = +p[1]-1, a = p[2]?+p[2]:2026;
            return new Date(a, m, d);
        }

        function getCor(cliente) {
            const hoje = new Date();
            const dt = parseData(cliente.dataTxt);
            const diff = Math.ceil((dt - hoje) / 86400000);
            if (diff < 0) return 'vermelho';
            if (diff <= 5) return 'amarelo';
            return 'verde';
        }

        function registrarEnvio(nome) {
            const hoje = new Date().toISOString().slice(0,10);
            const mes = new Date().toISOString().slice(0,7);
            statusEnviados[nome] = { data: hoje, mes: mes };
            localStorage.setItem('statusEnviados', JSON.stringify(statusEnviados));
        }

        function getStatus(nome) {
            const info = statusEnviados[nome];
            const mesAtual = new Date().toISOString().slice(0,7);
            if (info && info.mes === mesAtual) {
                return `🟢 Enviado em ${info.data}`;
            }
            return '⚪ Pendente';
        }

        function salvarTelefone(nome, tel) {
            telefonesSalvos[nome] = tel.replace(/\D/g,'');
            localStorage.setItem('telefonesPlanilha', JSON.stringify(telefonesSalvos));
        }

        function abrirWhats(nome, dataTxt) {
            const tel = telefonesSalvos[nome];
            if (!tel || tel.length < 10) {
                alert("Preencha o telefone completo (DDD + número) deste cliente.");
                return;
            }
            registrarEnvio(nome);
            let msg = MENSAGEM_BASE.replace('{nome}', nome).replace('{data}', dataTxt);
            window.open(`https://wa.me/55${tel}?text=${encodeURIComponent(msg)}`, '_blank');
            setTimeout(exibirLista, 700);
        }

        function proximoPendente() {
            const pend = dados.filter(c => {
                const telOk = telefonesSalvos[c.nome] && telefonesSalvos[c.nome].length >= 10;
                return telOk && !statusEnviados[c.nome];
            }).sort((a,b) => parseData(a.dataTxt) - parseData(b.dataTxt));
            
            if (pend.length === 0) return alert("Não há mais pendentes com telefone preenchido!");
            abrirWhats(pend[0].nome, pend[0].dataTxt);
        }

        function setFiltro(filtro) {
            filtroAtual = filtro;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.id === `btn-${filtro}`);
            });
            exibirLista();
        }

        function filtrar() {
            exibirLista();
        }

        function exibirLista() {
            const busca = document.getElementById('busca').value.toLowerCase().trim();
            const container = document.getElementById('lista');
            container.innerHTML = '';

            let total=0, pend=0, env=0, venc=0;

            const sorted = [...dados].sort((a,b) => parseData(a.dataTxt) - parseData(b.dataTxt));

            sorted.forEach(c => {
                if (busca && !c.nome.toLowerCase().includes(busca)) return;

                const statusInfo = getStatus(c.nome);
                const isEnviado = statusInfo.includes('Enviado');
                const isVencido = parseData(c.dataTxt) < new Date();

                if (filtroAtual === 'pendentes' && isEnviado) return;
                if (filtroAtual === 'enviados' && !isEnviado) return;
                if (filtroAtual === 'vencidos' && !isVencido) return;

                total++;
                if (isEnviado) env++; else pend++;
                if (isVencido) venc++;

                const div = document.createElement('div');
                div.className = `cliente ${getCor(c)}`;
                div.innerHTML = `
                    <div>
                        <strong class="${isVencido ? 'nome-vencido' : ''}">${c.nome}</strong><br>
                        <span style="color:#aaa">${c.dataTxt}</span>
                    </div>
                    <input type="tel" class="telefone-input" value="${telefonesSalvos[c.nome]||''}" 
                           placeholder="11999999999" onchange="salvarTelefone('${c.nome}', this.value)">
                    <div style="text-align:right">
                        <div class="status">${statusInfo}</div><br>
                        <button class="btn-whatsapp" onclick="abrirWhats('${c.nome}', '${c.dataTxt}')">💬 ABRIR WHATSAPP</button>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('total').textContent = total;
            document.getElementById('pendentes').textContent = pend;
            document.getElementById('enviados').textContent = env;
            document.getElementById('vencidos').textContent = venc;
        }

        window.onload = exibirLista;
    </script>
